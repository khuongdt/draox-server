# ================================================
# Draox Server — Docker Compose
# ================================================
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d --build            # Rebuild image & start
#   docker compose logs -f draox-server     # View server logs
#   docker compose down                     # Stop (keep volumes)
#   docker compose down -v                  # Stop & remove volumes
#
# Environment variables (create a .env file or export before running):
#   DRAOX_JWT_SECRET      Admin API JWT secret        (default: changeme-in-production)
#   DRAOX_PG_PASSWORD     PostgreSQL password          (default: draox_dev)
# ================================================

services:

  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: draox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: draox
      POSTGRES_USER: draox
      POSTGRES_PASSWORD: "${DRAOX_PG_PASSWORD:-draox_dev}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U draox -d draox"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - draox-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: draox-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - draox-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Draox Server ─────────────────────────────────
  draox-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: draox-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"       # TCP
      - "9001:9001/udp"   # UDP
      - "9002:9002"       # WebSocket
      - "9003:9003"       # HTTP
      - "9090:9090"       # Metrics (Prometheus)
      - "9100:9100"       # Admin API
    environment:
      RUST_LOG: "info,draox_server=info"
      RUST_BACKTRACE: "0"
      DRAOX_ADMIN_JWT_SECRET: "${DRAOX_JWT_SECRET:-changeme-in-production}"
      # Override storage URL with runtime password — the config/docker.toml provides
      # a default; set DRAOX_PG_PASSWORD to match the postgres service above.
      DRAOX_STORAGE_SQL_URL: "postgres://draox:${DRAOX_PG_PASSWORD:-draox_dev}@postgres:5432/draox"
      DRAOX_CACHE_REDIS_URL: "redis://redis:6379"
    volumes:
      - draox-data:/var/lib/draox-server
      - draox-logs:/var/log/draox-server
      - draox-plugins:/opt/draox-server/plugins
      - ./config/docker.toml:/etc/draox-server/config.toml:ro
      # Uncomment for TLS certificates:
      # - ./certs:/etc/draox-server/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 128M
          cpus: "0.5"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - draox-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Draox Admin (Frontend) ───────────────────────
  draox-admin:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: draox-admin
    restart: unless-stopped
    depends_on:
      draox-server:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/config:/app/config
      - ../frontend/public:/app/public
    networks:
      - draox-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus (optional) ────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: draox-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9091:9090"
  #   volumes:
  #     - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   depends_on:
  #     - draox-server
  #   networks:
  #     - draox-net

  # ── Grafana (optional) ───────────────────────────
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: draox-grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   depends_on:
  #     - prometheus
  #   networks:
  #     - draox-net

# ── Networks ─────────────────────────────────────
networks:
  draox-net:
    driver: bridge

# ── Volumes ──────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  draox-data:
    driver: local
  draox-logs:
    driver: local
  draox-plugins:
    driver: local
  # prometheus-data:
  #   driver: local
  # grafana-data:
  #   driver: local
